<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Currency Institute</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #070d10;
  --gold: #d4af37;
  --gold-dim: #8a7322;
  --text-light: #e0e0e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Mono', monospace;
  background-color: var(--bg-dark);
  color: var(--text-light);
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 20px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

h1, h2, h3, .cinzel { font-family: 'Cinzel Decorative', serif; }

header { text-align: center; margin-bottom: 40px; }
header h1 { color: var(--gold); font-size: 2.5rem; letter-spacing: 4px; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
header p { font-size: 0.9rem; color: #888; margin-top: 10px; letter-spacing: 1px; }

/* Time Selector */
.controls-panel {
  background: rgba(0,0,0,0.6); border: 1px solid var(--gold-dim);
  padding: 30px; border-radius: 10px; width: 100%; max-width: 600px;
  text-align: center; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.year-display {
  font-size: 3rem; color: var(--gold); font-weight: bold; margin-bottom: 10px;
}
.era-display {
  font-size: 1.2rem; color: #aaa; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
}
input[type=range] {
  -webkit-appearance: none; width: 100%; background: transparent; margin-bottom: 30px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
  background: var(--gold); cursor: pointer; margin-top: -10px; box-shadow: 0 0 10px var(--gold);
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%; height: 4px; cursor: pointer; background: var(--gold-dim); border-radius: 2px;
}

.btn-mint {
  background: linear-gradient(45deg, var(--gold-dim), var(--gold));
  color: #000; border: none; padding: 15px 40px; font-size: 1.2rem;
  font-family: 'Cinzel Decorative', serif; font-weight: bold; cursor: pointer;
  border-radius: 5px; width: 100%; transition: all 0.3s;
  box-shadow: 0 5px 15px rgba(212,175,55,0.2);
}
.btn-mint:hover { filter: brightness(1.2); box-shadow: 0 5px 25px rgba(212,175,55,0.4); transform: translateY(-2px); }
.btn-mint:disabled { filter: grayscale(1); cursor: not-allowed; }

/* Note Stage */
.note-stage {
  position: relative; width: 100%; max-width: 700px; aspect-ratio: 7/3; margin-bottom: 40px;
  perspective: 1000px;
}
.canvas-wrapper {
  position: absolute; inset: 0; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  border-radius: 5px; overflow: hidden; background: #111;
}
#banknote-canvas {
  width: 100%; height: 100%; display: block;
}
.uv-overlay {
  position: absolute; inset: 0; background: rgba(138, 43, 226, 0.4);
  mix-blend-mode: color; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.uv-text {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: #0ff; font-family: 'Space Mono'; font-weight: bold; font-size: 1.5vw;
  opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 10px #0ff; pointer-events: none;
  transform: rotate(-15deg);
}
.uv-active .uv-overlay, .uv-active .uv-text { opacity: 1; }

.note-actions {
  display: flex; justify-content: space-between; max-width: 700px; width: 100%; margin-bottom: 40px;
}
.btn-action {
  background: transparent; border: 1px solid var(--gold-dim); color: var(--gold);
  padding: 10px 20px; font-family: 'Space Mono'; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
}
.btn-action:hover { background: rgba(212,175,55,0.1); }

/* Results Panel */
.results-panel {
  display: none; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; width: 100%; margin-bottom: 60px;
}
.info-card {
  background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; border-radius: 5px;
}
.info-card.full { grid-column: 1 / -1; }
.card-label { color: var(--gold-dim); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
.lore-text { font-family: 'Cinzel Decorative', serif; font-style: italic; font-size: 1.1rem; line-height: 1.6; }
.badge { background: var(--gold); color: #000; padding: 5px 10px; display: inline-block; font-weight: bold; font-size: 1.2rem; }

/* Vault */
.vault { max-width: 800px; width: 100%; border-top: 1px solid #333; padding-top: 40px; }
.vault-title { text-align: center; color: var(--gold); margin-bottom: 20px; }
.vault-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 20px; }
.vault-item {
  min-width: 200px; height: 85px; background: #222; border: 1px solid #444;
  background-size: cover; background-position: center; cursor: pointer; transition: 0.2s;
}
.vault-item:hover { border-color: var(--gold); transform: scale(1.05); }

#loader-overlay {
  position: fixed; inset: 0; background: rgba(7, 13, 16, 0.9); z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#loader-overlay.active { opacity: 1; pointer-events: all; }
.spinner {
  width: 50px; height: 50px; border: 2px solid transparent; border-top-color: var(--gold);
  border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

#btn-mute { position: fixed; bottom: 20px; right: 20px; background: none; border: none; font-size: 2rem; cursor: pointer; opacity: 0.5; }
#btn-mute:hover { opacity: 1; }

@media(max-width: 768px) {
  .results-panel { grid-template-columns: 1fr; }
  .note-stage { height: auto; }
}
</style>
</head>
<body>

<header>
  <h1>Future Currency Institute</h1>
  <p>Authenticate currencies from any point in time.</p>
  <p id="stats-minted" style="font-size:0.8rem; color:#555;">Notes authenticated: 0</p>
</header>

<div class="controls-panel">
  <div class="year-display" id="year-text">2026</div>
  <div class="era-display" id="era-text">Digital Age 🌐</div>
  <input type="range" id="year-slider" min="2026" max="9999" value="2026">
  <button class="btn-mint" id="btn-mint">MINT THIS NOTE 💰</button>
</div>

<div class="note-stage" id="note-stage">
  <div class="canvas-wrapper">
    <canvas id="banknote-canvas" width="1400" height="600"></canvas>
    <div class="uv-overlay"></div>
    <div class="uv-text">THIS IS ART, NOT LEGAL TENDER IN ANY DIMENSION</div>
  </div>
</div>

<div class="note-actions">
  <button class="btn-action" id="btn-uv">🔍 TOGGLE UV LIGHT</button>
  <button class="btn-action" id="btn-dl">⬇️ DOWNLOAD NOTE</button>
</div>

<div class="results-panel" id="results-panel">
  <div class="info-card full">
    <div class="card-label">Lore</div>
    <div class="lore-text" id="res-lore"></div>
  </div>
  <div class="info-card">
    <div class="card-label">Exchange Rate</div>
    <div class="badge" id="res-exchange"></div>
  </div>
  <div class="info-card">
    <div class="card-label">Security Feature</div>
    <div id="res-security"></div>
  </div>
  <div class="info-card full">
    <div class="card-label">Motto</div>
    <div class="cinzel" style="font-size: 1.5rem; text-align: center;" id="res-motto"></div>
  </div>
  <div class="info-card full">
    <div class="card-label">Fun Fact</div>
    <div id="res-fact" style="font-style: italic; color: #aaa;"></div>
  </div>
</div>

<div class="vault" id="vault-section" style="display:none;">
  <h2 class="vault-title">Your Currency Collection</h2>
  <div class="vault-scroll" id="vault-scroll"></div>
</div>

<div id="loader-overlay">
  <div class="spinner"></div>
  <div style="color:var(--gold); font-family:'Space Mono';">SYNTHESIZING HISTORICAL DATA...</div>
</div>

<button id="btn-mute">💰</button>

<script src="app.js"></script>
</body>
</html>
